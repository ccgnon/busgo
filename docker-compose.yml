version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: busgo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     busgo
      POSTGRES_PASSWORD: busgo_password
      POSTGRES_DB:       busgo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busgo -d busgo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (GUI optionnel) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: busgo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@busgo.fr
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
