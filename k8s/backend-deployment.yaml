apiVersion: apps/v1
kind: Deployment
metadata:
  name: busgo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ccgnon/busgo-backend:latest
        envFrom:
        - configMapRef:
            name: busgo-config
        - secretRef:
            name: busgo-secrets
        ports:
        - containerPort: 4000
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: busgo-backend-service
spec:
  selector:
    app: backend
  ports:
  - port: 4000
    targetPort: 4000
